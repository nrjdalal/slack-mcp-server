# Slack app manifest — slack-mcp-pro (READ ONLY, user token / xoxp) — least privilege
#
# Create the app:  api.slack.com/apps  ->  Create New App  ->  From a manifest
#                  -> paste -> Create -> Install -> copy the "User OAuth Token".
#
# Verified read-only scope set (https://docs.slack.dev/reference/scopes, Jun 2026).
# Every scope here is read-only; no message can be sent or mutated with this app.
display_information:
  name: slack-mcp-pro (read-only)
  description: Read-only personal Slack MCP server (user token)
  background_color: "#0b1221"
oauth_config:
  scopes:
    user:
      - channels:read
      - groups:read
      - im:read
      - mpim:read
      - channels:history
      - groups:history
      - im:history
      - mpim:history
      - search:read
      - reactions:read
      - files:read
      - users:read
      - users.profile:read
      - usergroups:read
      - pins:read
      - bookmarks:read
      - emoji:read
      - team:read
      - dnd:read
      # - users:read.email   # add only if you need email addresses
      # - canvases:read      # add only if you read canvases (paid plans)
settings:
  org_deploy_enabled: true
  socket_mode_enabled: false
  token_rotation_enabled: false
