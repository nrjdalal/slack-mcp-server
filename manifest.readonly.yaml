# Slack app manifest: better-slack-mcp (read only, user token / xoxp), least privilege
#
# Create the app:  api.slack.com/apps  ->  Create New App  ->  From a manifest
#                  -> paste -> Create -> Install -> copy the "User OAuth Token".
#
# These user scopes are the exact set the read tools in packages/slack-core
# declare; no message can be sent or mutated with this app. For read + write
# use manifest.full.yaml instead.
display_information:
  name: better-slack-mcp (read-only)
  description: Read-only personal Slack MCP server (user token)
  background_color: "#0b1221"
oauth_config:
  scopes:
    user:
      - channels:history
      - channels:read
      - files:read
      - groups:history
      - groups:read
      - im:history
      - im:read
      - mpim:history
      - mpim:read
      - search:read
      - usergroups:read
      - users:read
      - users:read.email
settings:
  org_deploy_enabled: true
  socket_mode_enabled: false
  token_rotation_enabled: false
