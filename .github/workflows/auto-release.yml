name: auto-release

on:
  pull_request:
    types: [closed]
    branches: ["main"]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  update-changelog:
    name: Update changelog branch
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'canary'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit changelog to canary
        run: |
          # the changelog commit is mechanical (generated from already-reviewed PR titles),
          # so it lands directly on canary instead of going through a PR
          git checkout canary
          # install first so every bunx below resolves the LOCKED versions
          # (changelogen's output format is load-bearing for the content gate)
          bun install --ignore-scripts
          # the boundary this changelog covers; tagged below so the next run starts exactly here
          BOUNDARY=$(git rev-parse HEAD)
          LAST_TAG=$(git describe --tags --abbrev=0 --match "v*" 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            # only changelog commits (or nothing) since the anchor: skip, but backfill the
            # release if a previous run pushed the commit+tag and failed before publishing
            if [ "$(git rev-list "$LAST_TAG"..HEAD --count --invert-grep --grep='^ci(changelog)')" = "0" ]; then
              if ! gh release view "$LAST_TAG" > /dev/null 2>&1; then
                NOTES=$(awk -v ver="## $LAST_TAG" '$0 == ver { flag = 1; next } /^## / { flag = 0 } flag' CHANGELOG.md)
                gh release create "$LAST_TAG" --title "$LAST_TAG" --notes "$NOTES" --latest
              fi
              echo "No releasable commits since $LAST_TAG, skipping changelog"
              exit 0
            fi
            bunx changelogen --bump --from "$LAST_TAG" --no-commit || true
          elif [ -f CHANGELOG.md ] && [ -s CHANGELOG.md ]; then
            # pre-tags fallback: anchor on the last commit that touched the changelog
            FROM_COMMIT=$(git log -1 --format=%H -- CHANGELOG.md 2>/dev/null || echo "")
            if [ -n "$FROM_COMMIT" ]; then
              bunx changelogen --bump --from "$FROM_COMMIT" --no-commit || true
            else
              bunx changelogen --bump --no-commit || true
            fi
          else
            bunx changelogen --bump --no-commit || true
          fi
          bunx oxfmt --write CHANGELOG.md
          # refresh the build-graph snapshot for this release from a fresh CI build
          # (env mirrors auto-check-build.yml so size labels match the PR-check build)
          NODE_ENV=production SKIP_ENV_VALIDATION=true bunx turbo build
          bun .github/scripts/build-sizes.ts --graph
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} bun .github/scripts/changelog-manager.ts
          # gate intentionally ignores the svg: it only ships riding a real release
          # (changelog or version change); alone it is never worth a commit.
          # content check: a range of only filtered-out commit types still bumps,
          # so also require at least one entry in the new section before releasing
          SECTION=$(awk '/^## v/ { n++ } n == 1' CHANGELOG.md | sed '/^### ❤️ Contributors/,$d')
          if [ -n "$(git status --porcelain CHANGELOG.md package.json)" ] && echo "$SECTION" | grep -q '^- '; then
            git add CHANGELOG.md package.json .github/assets/graph-build.svg
            git commit -m "ci(changelog): update changelog and bump version"
            NEW_VERSION=$(bun -e 'console.log(JSON.parse(await Bun.file("package.json").text()).version)')
            # fail loudly on tag collision: proceeding would mislabel this changelog section
            EXISTING=$(git rev-parse -q --verify "refs/tags/v$NEW_VERSION^{commit}" || true)
            if [ -n "$EXISTING" ] && [ "$EXISTING" != "$BOUNDARY" ]; then
              echo "::error::tag v$NEW_VERSION exists at $EXISTING but boundary is $BOUNDARY"
              exit 1
            fi
            if [ -z "$EXISTING" ]; then
              git tag "v$NEW_VERSION" "$BOUNDARY"
            fi
            # atomic: branch and tag land together or not at all, no corrupting middle state
            git push --atomic https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git canary "refs/tags/v$NEW_VERSION"
            # publish a GitHub release whose notes mirror the changelog section
            NOTES=$(awk -v ver="## v$NEW_VERSION" '$0 == ver { flag = 1; next } /^## / { flag = 0 } flag' CHANGELOG.md)
            if ! gh release view "v$NEW_VERSION" > /dev/null 2>&1; then
              gh release create "v$NEW_VERSION" --title "v$NEW_VERSION" --notes "$NOTES" --latest
            fi
          else
            echo "No releasable changelog content, skipping release"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
