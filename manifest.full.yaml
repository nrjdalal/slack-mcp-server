# Slack app manifest — slack-mcp-pro (full: read + write, user token / xoxp)
#
# Create the app:  api.slack.com/apps  ->  Create New App  ->  From a manifest
#                  -> paste this file -> Create -> Install to Workspace
#                  -> copy the "User OAuth Token" (xoxp-...) into SLACK_MCP_XOXP_TOKEN.
#
# Scope names verified against https://docs.slack.dev/reference/scopes (Jun 2026).
# Write tools are gated OFF by default at runtime (SLACK_MCP_ALLOW_WRITE); these
# scopes are requested so writes work once enabled. For a read-only install use
# manifest.readonly.yaml instead.
display_information:
  name: slack-mcp-pro
  description: Personal, per-workspace Slack MCP server (user token)
  background_color: "#0b1221"
oauth_config:
  scopes:
    user:
      # --- read ---
      - channels:read
      - groups:read
      - im:read
      - mpim:read
      - channels:history
      - groups:history
      - im:history
      - mpim:history
      - search:read          # classic search scope; covers search.messages/files/all
      - reactions:read
      - files:read
      - users:read
      - users:read.email     # only needed to read email addresses
      - users.profile:read   # note the dot before the colon
      - usergroups:read
      - pins:read
      - bookmarks:read
      - emoji:read
      - team:read
      - dnd:read
      - canvases:read        # paid plans
      # --- write (used only when SLACK_MCP_ALLOW_WRITE is on) ---
      - chat:write
      - channels:write
      - groups:write
      - im:write
      - mpim:write
      - reactions:write
      - files:write
      - users.profile:write
      - users:write          # set own presence
      - usergroups:write     # paid plans
      - pins:write
      - bookmarks:write
      - canvases:write       # paid plans
      - dnd:write
      # --- optional granular write (uncomment if you enable these tools) ---
      # - channels:write.topic   # set_topic / set_purpose (public)
      # - groups:write.topic     # set_topic / set_purpose (private)
      # - channels:write.invites # invite_to_channel (public)
      # - groups:write.invites   # invite_to_channel (private)
settings:
  org_deploy_enabled: true
  socket_mode_enabled: false
  token_rotation_enabled: false
